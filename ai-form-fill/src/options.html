<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dataverse AI Autofill Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Dataverse AI Autofill Settings (Azure)</h1>

      <section>
        <h2>AI Foundry</h2>
        <label for="azureEndpoint">Endpoint</label>
        <input id="azureEndpoint" type="text" placeholder="https://YOUR-RESOURCE.openai.azure.com" />

        <label for="azureModel">Deployment Name</label>
        <input id="azureModel" type="text" placeholder="gpt-5.1" />

        <label for="azureApiKey">API key</label>
        <input id="azureApiKey" type="password" />
      </section>

      <section>
        <h2>Autofill Behavior</h2>
        <label for="fillLockedFields">
          <input id="fillLockedFields" type="checkbox" />
          Fill locked fields (disabled/read-only controls)
        </label>
        <label for="fillLookupFields">
          <input id="fillLookupFields" type="checkbox" />
          Fill lookup fields (may be slower)
        </label>
      </section>

      <button id="saveBtn">Save settings</button>
      <p id="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
